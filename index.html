<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nurul Sabila Ramadani | Professional Portfolio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Montserrat', sans-serif; background-color: #FFF5F7; overflow-x: hidden; }
        h1, h2, h3 { font-family: 'Playfair Display', serif; }
        
        /* 1. ANIMASI PEMBUKA (WELCOME SCREEN) */
        #loader {
            position: fixed; inset: 0; background: #000;
            display: flex; align-items: center; justify-content: center;
            z-index: 1000; transition: opacity 2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .welcome-content { text-align: center; color: white; }

        .welcome-line {
            height: 1px; width: 0; background: #D53F8C;
            margin: 20px auto; animation: growLine 2.5s forwards ease-in-out;
        }

        @keyframes growLine { to { width: 180px; } }

        .fade-in-text {
            opacity: 0; transform: translateY(25px);
            animation: textUp 1.8s forwards ease-out;
        }

        @keyframes textUp { to { opacity: 1; transform: translateY(0); } }

        .loader-hide { opacity: 0; visibility: hidden; }

        /* 2. EFEK CAHAYA & MELAYANG PADA FOTO */
        .profile-container {
            position: relative;
            animation: floating 4.5s ease-in-out infinite;
        }

        .profile-glow {
            position: absolute; inset: -15px;
            background: radial-gradient(circle, rgba(213, 63, 140, 0.35) 0%, transparent 75%);
            border-radius: 50%; animation: pulseGlow 4s infinite;
        }

        @keyframes pulseGlow {
            0%, 100% { transform: scale(1); opacity: 0.4; }
            50% { transform: scale(1.3); opacity: 0.7; }
        }

        @keyframes floating {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-25px) rotate(3deg); }
        }

        .profile-frame:hover {
            transform: scale(1.1) rotate(-3deg);
            transition: 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            filter: brightness(1.1);
        }

        /* 3. CARD ANIMASI */
        .card-fashion { transition: 0.8s cubic-bezier(0.22, 1, 0.36, 1); }
        .card-fashion:hover { transform: translateY(-15px) scale(1.02); }
    </style>
</head>
<body class="text-gray-800">

    <div id="loader">
        <div class="welcome-content px-6">
            <p class="text-pink-500 tracking-[0.7em] text-[10px] mb-4 uppercase fade-in-text" style="animation-delay: 0.5s;">Selamat Datang</p>
            <h2 class="text-4xl italic mb-2 fade-in-text" style="animation-delay: 1.2s;">Nurul Sabila Ramadani</h2>
            <div class="welcome-line"></div>
            <p class="text-gray-400 text-xs tracking-[0.3em] italic fade-in-text" style="animation-delay: 2.2s;">"Menyulam Keindahan dalam Setiap Jahitan"</p>
        </div>
    </div>

    <div class="max-w-2xl mx-auto px-6 py-16">
        <header class="text-center mb-32">
            <div class="profile-container w-48 h-48 mx-auto mb-10">
                <div class="profile-glow"></div>
                <div class="profile-frame w-full h-full relative z-10 bg-white rounded-full overflow-hidden border-[6px] border-white shadow-2xl">
                    <img src="IMG-20260506-WA0012.jpg" alt="Nurul Sabila" class="w-full h-full object-cover">
                </div>
            </div>
            
            <div data-aos="fade-up" data-aos-duration="1500">
                <h1 class="text-4xl font-bold tracking-tight text-pink-600">Nurul Sabila Ramadani</h1>
                <p class="text-gray-400 text-xs uppercase tracking-[0.5em] mt-5 font-semibold">Professional Fashion Designer</p>
            </div>
        </header>

        <div class="space-y-28">
            <div class="card-fashion bg-white p-6 rounded-[3rem] shadow-2xl shadow-pink-100/60" data-aos="fade-up">
                <div class="overflow-hidden rounded-[2.5rem]">
                    <img src="IMG-20260506-WA0018.jpg" class="w-full hover:scale-110 transition duration-[2.5s]" alt="Koleksi 1">
                </div>
                <div class="text-center mt-8">
                    <span class="text-[10px] text-pink-400 tracking-widest uppercase">Premium Look</span>
                    <h3 class="text-2xl mt-2 italic">The Royal Rose</h3>
                </div>
            </div>

            <div class="card-fashion bg-white p-6 rounded-[3rem] shadow-2xl shadow-pink-100/60" data-aos="fade-up">
                <div class="overflow-hidden rounded-[2.5rem]">
                    <img src="IMG-20260506-WA0014.jpg" class="w-full hover:scale-110 transition duration-[2.5s]" alt="Koleksi 2">
                </div>
                <div class="text-center mt-8">
                    <span class="text-[10px] text-pink-400 tracking-widest uppercase">Silk Collection</span>
                    <h3 class="text-2xl mt-2 italic">Midnight Dream</h3>
                </div>
            </div>

            <div class="card-fashion bg-white p-6 rounded-[3rem] shadow-2xl shadow-pink-100/60" data-aos="fade-up">
                <div class="overflow-hidden rounded-[2.5rem]">
                    <img src="IMG-20260506-WA0015.jpg" class="w-full hover:scale-110 transition duration-[2.5s]" alt="Koleksi 3">
                </div>
                <div class="text-center mt-8">
                    <span class="text-[10px] text-pink-400 tracking-widest uppercase">Blush Series</span>
                    <h3 class="text-2xl mt-2 italic">Floral Symphony</h3>
                </div>
            </div>
        </div>

        <footer class="mt-48 text-center pb-24">
            <div data-aos="zoom-in">
                <a href="https://wa.me/628123456789" class="inline-block bg-gradient-to-r from-black to-gray-800 text-white px-14 py-5 rounded-full text-[10px] tracking-[0.3em] uppercase hover:from-pink-600 hover:to-pink-400 transition-all duration-700 shadow-2xl shadow-pink-200">Connect With Me</a>
            </div>
            <p class="text-[10px] text-gray-300 tracking-[0.6em] uppercase mt-24 opacity-60">
                &copy; 2026 Nurul Sabila Ramadani
            </p>
        </footer>
    </div>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        AOS.init({ duration: 2000, once: true });
        
        window.addEventListener('load', () => {
            // Loader muncul sedikit lebih lama agar teks terbaca sempurna
            setTimeout(() => {
                document.getElementById('loader').classList.add('loader-hide');
            }, 6000); 
        });
    </script>
</body>
</html>
