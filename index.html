<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nurul Sabila Ramadani | Fashion Designer Portfolio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Montserrat', sans-serif; background-color: #FFF5F7; }
        h1, h2, h3 { font-family: 'Playfair Display', serif; }
        
        /* Loading Screen */
        #loader {
            position: fixed; inset: 0; background: white;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 100; transition: opacity 0.8s ease-out, visibility 0.8s;
        }
        .progress-bar { width: 200px; height: 2px; background: #ffe4e6; margin-top: 20px; overflow: hidden; }
        .progress-fill { width: 0%; height: 100%; background: #D53F8C; animation: load 2.5s forwards; }
        @keyframes load { 0% { width: 0%; } 100% { width: 100%; } }
        .fade-out { opacity: 0; visibility: hidden; }
    </style>
</head>
<body class="text-gray-800">

    <div id="loader">
