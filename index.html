<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nurul Sabila Ramadani | High-End Portfolio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Montserrat', sans-serif; background-color: #FFF5F7; overflow-x: hidden; }
        h1, h2, h3 { font-family: 'Playfair Display', serif; }
        
        /* SLOW CINEMATIC REVEAL */
        #loader {
            position: fixed; inset: 0; display: flex; z-index: 1000; pointer-events: none;
        }
        .shutter {
            flex: 1; background: #000; 
            transition: transform 1.8s cubic-bezier(0.7, 0, 0.3, 1);
        }
        .shutter.left { transform-origin: left; }
        .shutter.right { transform-origin: right; }
        
        #loader-text {
            position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
            z-index: 1001; color: white; text-align: center; pointer-events: none;
        }
        .reveal-box { overflow: hidden; }
        .reveal-text { 
            display: block; font-size: 1.5rem; letter-spacing: 0.8em; text-transform: uppercase;
            transform: translateY(100%); 
            animation: slideUp 1.2s forwards cubic-bezier(0.2, 1, 0.3, 1);
        }
        
        @keyframes slideUp { to { transform: translateY(0); } }

        .loaded .shutter.left { transform: translateX(-100%); }
        .loaded .shutter.right { transform: translateX(100%); }
        .loaded #loader-text { 
            opacity: 0; 
            transform: scale(0.95); 
            transition: opacity 1.2s ease, transform 1.2s ease; 
        }

        /* PROFILE ANIMATION */
        .profile-frame {
            animation: floating 4s ease-in-out infinite;
            transition: all 0.8s cubic-bezier(0.165, 0.84, 0.44, 1);
        }
        @keyframes floating {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-15px); }
        }
        .profile-frame:hover {
            transform: scale(1.08) rotate(2deg) !important;
            box-shadow: 0 40px 80px -15px rgba(213, 63, 140, 0.3);
        }

        .card-fashion { transition: all 0.6s ease; }
        .card-fashion:hover { transform: translateY(-12px); }
    </style>
</head>
<body class="text-gray-800">

    <div id="loader-text">
        <div class="reveal-box px-4">
            <span class="reveal-text">NSR DESIGN</span>
            <div class="w-16 h-[1px] bg-pink-500 mx-auto mt-6 opacity-40 animate-pulse"></div>
            <p class="text-[8px] mt-4 tracking-[0.5em] text-gray-400 uppercase italic">Collection 2026</p>
        </div>
    </div>
    <div id="loader">
        <div class="shutter left"></div>
        <div class="shutter right"></div>
    </div>

    <div class="max-w-2xl mx-auto px-6 py-16">
        <header class="text-center mb-24">

                <img src="IMG-20260506-WA0012.jpg" alt="Nurul Sabila" class="w-full h-full object-cover">
            </div>
            <div data-aos="fade-up" data-aos-duration="1200" data-aos-delay="400">

            </div>
        </header>

        <div class="space-y-20">
            <div class="card-fashion bg-white p-5 rounded-[2.5rem] shadow-xl shadow-pink-50" data-aos="fade-up">
                <div class="overflow-hidden rounded-[2rem]">
                    <img src="IMG-20260506-WA0018.jpg" class="w-full hover:scale-110 transition duration-[2s]" alt="Koleksi 1">
                </div>
                <h3 class="text-xl text-center mt-6">Elegant Rose</h3>
            </div>

            <div class="card-fashion bg-white p-5 rounded-[2.5rem] shadow-xl shadow-pink-50" data-aos="fade-up">
                <div class="overflow-hidden rounded-[2rem]">
                    <img src="IMG-20260506-WA0014.jpg" class="w-full hover:scale-110 transition duration-[2s]" alt="Koleksi 2">
                </div>
                <h3 class="text-xl text-center mt-6">Midnight Silk</h3>
            </div>

            <div class="card-fashion bg-white p-5 rounded-[2.5rem] shadow-xl shadow-pink-50" data-aos="fade-up">
                <div class="overflow-hidden rounded-[2rem]">
                    <img src="IMG-20260506-WA0015.jpg" class="w-full hover:scale-110 transition duration-[2s]" alt="Koleksi 3">
                </div>
                <h3 class="text-xl text-center mt-6">Blush Dream</h3>
            </div>

            <div class="card-fashion bg-white p-5 rounded-[2.5rem] shadow-xl shadow-pink-50" data-aos="fade-up">
                <div class="overflow-hidden rounded-[2rem]">
                    <img src="IMG-20260506-WA0016.jpg" class="w-full hover:scale-110 transition duration-[2s]" alt="Koleksi 4">
                </div>
                <h3 class="text-xl text-center mt-6">Classic Peony</h3>
            </div>

            <div class="card-fashion bg-white p-5 rounded-[2.5rem] shadow-xl shadow-pink-50" data-aos="fade-up">
                <div class="overflow-hidden rounded-[2rem]">
                    <img src="IMG-20260504-WA0025.jpg" class="w-full hover:scale-110 transition duration-[2s]" alt="Koleksi 5">
                </div>
                <h3 class="text-xl text-center mt-6">Golden Hour</h3>
            </div>
        </div>

        <footer class="mt-32 text-center">
            <div data-aos="zoom-in" class="mb-12">
                <a href="https://wa.me/628123456789" class="bg-black text-white px-10 py-4 rounded-full text-[10px] tracking-widest uppercase hover:bg-pink-600 transition duration-700 shadow-xl">Contact Designer</a>
            </div>
            <p class="text-[9px] text-gray-300 tracking-[0.4em] uppercase border-t border-pink-50 pt-10 pb-16">
                &copy; 2026 Nurul Sabila Ramadani
            </p>
        </footer>
    </div>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        AOS.init({ duration: 1500, once: true });
        
        window.addEventListener('load', () => {
            // Loader tampil selama 4 detik agar sinematik
            setTimeout(() => {
                document.body.classList.add('loaded');
            }, 4000); 
        });
    </script>
</body>
</html>
